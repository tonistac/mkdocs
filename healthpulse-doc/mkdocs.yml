site_name: HealthPulse DevOps Documentation
site_description: DevOps documentation for the HealthPulse Portal capstone project
site_author: HealthPulse DevOps Team

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Architecture:
      - Decisions (ADRs): architecture.md
      - Environment Matrix: environments.md
      - CI/CD Pipeline: pipeline.md
  - Setup Guides:
      - Template (copy for each tool): setup-template.md
  - Operations:
      - Runbooks: runbooks.md
      - Incident Log: incidents.md
  - Changelog: changelog.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html